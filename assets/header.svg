<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="Tejas Naladala — Hardware Engineer, AI Builder, Founder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07090e"/>
      <stop offset="0.6" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0b1018"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4d8d"/>
      <stop offset="0.52" stop-color="#b15cff"/>
      <stop offset="1" stop-color="#34d9f0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b15cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#b15cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <style>
      @keyframes up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
      @keyframes rule { from { transform:scaleX(0); } to { transform:scaleX(1); } }
      @keyframes breathe { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
      .k  { opacity:0; animation: up .8s cubic-bezier(.2,.7,.2,1) .15s forwards; }
      .nm { opacity:0; animation: up .9s cubic-bezier(.2,.7,.2,1) .3s forwards; }
      .ds { opacity:0; animation: up .9s cubic-bezier(.2,.7,.2,1) .55s forwards; }
      .ln { transform-origin: 66px 196px; animation: rule 1s cubic-bezier(.2,.7,.2,1) .5s both; }
      .nd { animation: breathe 4s ease-in-out infinite; }
      .d2 { animation-delay: 1s; } .d3 { animation-delay: 2s; } .d4 { animation-delay: 3s; }
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .mono { font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace; }
      @media (prefers-reduced-motion: reduce) {
        .k,.nm,.ds { opacity:1; animation:none; } .ln { animation:none; } .nd { animation:none; opacity:0.8; }
        circle[data-travel] { display:none; }
      }
    </style>
  </defs>

  <rect width="1200" height="300" rx="14" fill="url(#bg)"/>
  <ellipse cx="965" cy="150" rx="360" ry="220" fill="url(#glow)"/>

  <!-- right-side abstract: plasma arc resolving into a sparse connectome -->
  <g opacity="0.9">
    <path d="M735 250 C 840 215, 905 120, 1010 96 S 1165 60, 1180 44" stroke="url(#name)" stroke-width="2.4" stroke-linecap="round" filter="url(#soft)" opacity="0.55"/>
    <path d="M735 250 C 840 215, 905 120, 1010 96 S 1165 60, 1180 44" stroke="url(#name)" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <g stroke="#3aa7c4" stroke-opacity="0.16" stroke-width="1.3">
    <path d="M820 196 L905 118 M905 118 L1010 96 M1010 96 L1058 178 M1058 178 L965 222 M965 222 L820 196 M905 118 L965 222 M1058 178 L1142 132 M1142 132 L1010 96"/>
  </g>
  <g fill="#0d1117" stroke-width="2">
    <circle class="nd"    cx="820" cy="196" r="5.5" stroke="#34d9f0"/>
    <circle class="nd d2" cx="905" cy="118" r="6.5" stroke="#b15cff"/>
    <circle class="nd d3" cx="1010" cy="96"  r="7"   stroke="#ff4d8d"/>
    <circle class="nd d2" cx="1058" cy="178" r="5.5" stroke="#34d9f0"/>
    <circle class="nd d4" cx="965"  cy="222" r="6"   stroke="#b15cff"/>
    <circle class="nd d3" cx="1142" cy="132" r="5"   stroke="#34d9f0"/>
  </g>
  <circle data-travel="1" r="3" fill="#ff4d8d" opacity="0.95">
    <animateMotion dur="5s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"
      path="M735 250 C 840 215, 905 120, 1010 96 S 1165 60, 1180 44"/>
  </circle>
  <circle data-travel="1" r="2.4" fill="#34d9f0" opacity="0.9">
    <animateMotion dur="6.5s" begin="1.5s" repeatCount="indefinite"
      path="M820 196 L905 118 L1010 96 L1058 178 L965 222 Z"/>
  </circle>

  <!-- typographic block -->
  <text class="k mono" x="66" y="96" font-size="14" letter-spacing="4.5" fill="#34d9f0">HARDWARE ENGINEER &#160;·&#160; AI BUILDER &#160;·&#160; FOUNDER</text>
  <text class="nm" x="63" y="170" font-size="66" font-weight="800" letter-spacing="0.5" fill="url(#name)">Tejas Naladala</text>
  <rect class="ln" x="66" y="194" width="300" height="2.5" rx="1.5" fill="url(#name)"/>
  <text class="ds" x="66" y="232" font-size="17" fill="#aeb6c2">Autonomous research engines and verification for AI.<tspan fill="#6b7480">  /  </tspan>Plasma reactors first.</text>
</svg>
