<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="Tejas Naladala — Plasma Hardware, AI/ML, Research">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="nameclip">
      <text x="70" y="180" font-size="76" font-weight="700" letter-spacing="-0.5" style="font-family:'SG','Segoe UI',Arial,sans-serif">Tejas Naladala</text>
    </clipPath>
    <style>
      @font-face{font-family:'SG';font-style:normal;font-weight:400 700;src:url(data:font/woff2;base64,) format('woff2');}
      text{font-family:'SG','Segoe UI',Arial,sans-serif;}
      @keyframes up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
      @keyframes sweep{0%{transform:translateX(-260px);}60%,100%{transform:translateX(680px);}}
      .k{opacity:0;animation:up .9s cubic-bezier(.2,.7,.2,1) .15s forwards;}
      .nm{opacity:0;animation:up 1s cubic-bezier(.2,.7,.2,1) .3s forwards;}
      .ds{opacity:0;animation:up 1s cubic-bezier(.2,.7,.2,1) .55s forwards;}
      .sheen{animation:sweep 5s ease-in-out 1.4s infinite;}
      @media (prefers-reduced-motion: reduce){
        .k,.nm,.ds{opacity:1;animation:none;}
        .sheen{display:none;}
      }
    </style>
  </defs>

  <rect width="1200" height="300" rx="14" fill="#0a0c10"/>

  <text class="k" x="71" y="104" font-size="13.5" font-weight="500" letter-spacing="4.5" fill="#ffffff" fill-opacity="0.5">PLASMA HARDWARE&#160;&#160;·&#160;&#160;AI / ML&#160;&#160;·&#160;&#160;RESEARCH</text>
  <text class="nm" x="70" y="180" font-size="76" font-weight="700" letter-spacing="-0.5" fill="#ffffff">Tejas Naladala</text>
  <g clip-path="url(#nameclip)">
    <rect class="sheen" x="0" y="112" width="170" height="92" fill="url(#sheen)"/>
  </g>
  <text class="ds" x="71" y="236" font-size="16.5" font-weight="400" fill="#ffffff" fill-opacity="0.42">Plasma systems for agriculture.&#160;&#160;AI research and verification on the side.</text>
</svg>
