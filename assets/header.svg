<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" fill="none" role="img" aria-label="Tejas Naladala — Hardware Engineer, AI Builder, Founder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b11"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3d81"/>
      <stop offset="0.5" stop-color="#b15cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff3d81" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ff3d81" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes fadeUp { from { opacity:0; transform:translateY(14px);} to { opacity:1; transform:translateY(0);} }
      @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
      @keyframes pulse { 0%,100%{opacity:0.35;} 50%{opacity:1;} }
      @keyframes grow  { from { transform:scaleX(0);} to { transform:scaleX(1);} }
      .t1 { animation: fadeUp 0.9s ease-out both; }
      .t2 { animation: fadeUp 0.9s ease-out 0.25s both; }
      .t3 { animation: fadeUp 0.9s ease-out 0.5s both; }
      .rule { transform-origin: 64px 215px; animation: grow 1.1s ease-out 0.4s both; }
      .caret { animation: blink 1.1s steps(1) infinite; }
      .node { animation: pulse 3.2s ease-in-out infinite; }
      .n2 { animation-delay: 0.6s; } .n3 { animation-delay: 1.2s; } .n4 { animation-delay: 1.8s; } .n5 { animation-delay: 2.4s; }
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .mono { font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>
  <ellipse cx="980" cy="150" rx="420" ry="240" fill="url(#glow)"/>

  <!-- connectome / circuit motif -->
  <g stroke="#22d3ee" stroke-opacity="0.18" stroke-width="1.5">
    <path d="M860 70 L1010 120 M1010 120 L1120 70 M1010 120 L1080 210 M1080 210 L960 250 M960 250 L860 190 M860 190 L860 70 M860 190 L1010 120 M960 250 L1100 250 M1120 70 L1140 160 M1140 160 L1080 210 M780 130 L860 70 M780 130 L860 190 M780 240 L960 250 M780 240 L780 130"/>
  </g>
  <g fill="#0d1117" stroke="#22d3ee" stroke-width="2">
    <circle class="node"    cx="860" cy="70"  r="6"/>
    <circle class="node n3" cx="1010" cy="120" r="7" stroke="#b15cff"/>
    <circle class="node n2" cx="1120" cy="70"  r="5"/>
    <circle class="node n4" cx="1080" cy="210" r="6"/>
    <circle class="node n5" cx="960" cy="250" r="7" stroke="#ff3d81"/>
    <circle class="node n2" cx="860" cy="190" r="6"/>
    <circle class="node n4" cx="1140" cy="160" r="5"/>
    <circle class="node n3" cx="780" cy="130" r="5" stroke="#b15cff"/>
    <circle class="node n5" cx="780" cy="240" r="6"/>
    <circle class="node"    cx="1100" cy="250" r="5"/>
  </g>
  <!-- traveling signal pulses -->
  <circle r="3.5" fill="#ff3d81">
    <animateMotion dur="3.4s" repeatCount="indefinite" path="M860 70 L1010 120 L1080 210 L960 250 L860 190 Z"/>
  </circle>
  <circle r="3" fill="#22d3ee">
    <animateMotion dur="4.6s" repeatCount="indefinite" path="M780 130 L860 190 L1010 120 L1120 70"/>
  </circle>
  <circle r="3" fill="#b15cff">
    <animateMotion dur="5.2s" repeatCount="indefinite" path="M780 240 L960 250 L1100 250 L1080 210 L1140 160"/>
  </circle>

  <!-- text block -->
  <text x="62" y="120" class="t1 mono" font-size="20" fill="#22d3ee" letter-spacing="3">$ whoami</text>
  <text x="60" y="190" class="t2" font-size="72" font-weight="800" fill="url(#name)" letter-spacing="1">TEJAS NALADALA</text>
  <rect class="rule" x="64" y="210" width="392" height="3" rx="2" fill="url(#name)"/>
  <text x="64" y="252" class="t3 mono" font-size="23" fill="#c9d1d9">Hardware Engineer<tspan fill="#6e7681"> · </tspan>AI Builder<tspan fill="#6e7681"> · </tspan>Founder<tspan class="caret" fill="#22d3ee">_</tspan></text>
  <text x="64" y="284" class="t3" font-size="16" fill="#7d8590">Shipped industrial plasma reactors before college. Now building autonomous research engines and AI verification.</text>
</svg>
